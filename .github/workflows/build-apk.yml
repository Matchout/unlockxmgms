name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Generate Android project
        shell: bash
        run: |
          set -euo pipefail

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven {
                      url = uri("https://api.xposed.info/")
                  }
              }
          }

          rootProject.name = "CnGmsUnlocker"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          mkdir -p app/src/main/java/io/github/cngmsunlocker
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "io.github.cngmsunlocker"
              compileSdk 35

              defaultConfig {
                  applicationId "io.github.cngmsunlocker"
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName "1.0"
              }
          }

          dependencies {
              compileOnly "de.robv.android.xposed:api:82"
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="false"
                  android:hasCode="true"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme">

                  <meta-data
                      android:name="xposedmodule"
                      android:value="true" />

                  <meta-data
                      android:name="xposeddescription"
                      android:value="Remove CN GMS feature flags" />

                  <meta-data
                      android:name="xposedminversion"
                      android:value="93" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">CN GMS Unlocker</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar" />
          </resources>
          EOF

          cat > app/src/main/assets/xposed_init <<'EOF'
          io.github.cngmsunlocker.HookEntry
          EOF

          cat > app/src/main/assets/scope.list <<'EOF'
          android
          EOF

          cat > app/src/main/java/io/github/cngmsunlocker/HookEntry.java <<'EOF'
          package io.github.cngmsunlocker;

          import java.lang.reflect.Method;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public final class HookEntry implements IXposedHookLoadPackage {
              private static final String TAG = "CnGmsUnlocker";

              private static final String FEATURE_CN_GMS = "cn.google.services";
              private static final String FEATURE_SERVICES_UPDATER = "com.google.android.feature.services_updater";

              private static volatile boolean oneShotInstalled = false;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) {
                  if (!"android".equals(lpparam.packageName)) {
                      return;
                  }

                  log("loaded android process");
                  hookSystemConfig(lpparam.classLoader);
              }

              private static void hookSystemConfig(ClassLoader classLoader) {
                  try {
                      Class<?> systemConfigClass = XposedHelpers.findClass(
                              "com.android.server.SystemConfig",
                              classLoader
                      );

                      XposedBridge.hookAllConstructors(systemConfigClass, new XC_MethodHook() {
                          @Override
                          protected void afterHookedMethod(MethodHookParam param) {
                              log("SystemConfig constructor hit");
                              removeCnGmsFeatures(param.thisObject, "constructor");
                          }
                      });

                      XposedBridge.hookAllMethods(systemConfigClass, "getAvailableFeatures", new XC_MethodHook() {
                          @Override
                          protected void beforeHookedMethod(MethodHookParam param) {
                              removeCnGmsFeatures(param.thisObject, "before getAvailableFeatures");
                          }
                      });

                      try {
                          XposedBridge.hookAllMethods(systemConfigClass, "getInstance", new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam param) {
                                  Object instance = param.getResult();
                                  if (instance != null) {
                                      removeCnGmsFeatures(instance, "after getInstance");
                                  }
                              }
                          });
                      } catch (Throwable t) {
                          log("getInstance hook skipped: " + t);
                      }

                      log("SystemConfig hooks installed");
                  } catch (Throwable t) {
                      log("SystemConfig hook failed: " + t);
                  }
              }

              private static void removeCnGmsFeatures(Object systemConfig, String source) {
                  if (systemConfig == null) {
                      log(source + ": SystemConfig object is null");
                      return;
                  }

                  boolean ok1 = callRemoveFeature(systemConfig, FEATURE_CN_GMS);
                  boolean ok2 = callRemoveFeature(systemConfig, FEATURE_SERVICES_UPDATER);

                  log(source + ": removeFeature results: "
                          + FEATURE_CN_GMS + "=" + ok1 + ", "
                          + FEATURE_SERVICES_UPDATER + "=" + ok2);

                  if (!oneShotInstalled) {
                      oneShotInstalled = true;
                      log("CN GMS feature removal attempted");
                  }
              }

              private static boolean callRemoveFeature(Object systemConfig, String featureName) {
                  try {
                      Method method = systemConfig.getClass().getDeclaredMethod("removeFeature", String.class);
                      method.setAccessible(true);
                      method.invoke(systemConfig, featureName);
                      return true;
                  } catch (Throwable first) {
                      try {
                          XposedHelpers.callMethod(systemConfig, "removeFeature", featureName);
                          return true;
                      } catch (Throwable second) {
                          log("removeFeature failed for " + featureName + ": " + second);
                          return false;
                      }
                  }
              }

              private static void log(String message) {
                  XposedBridge.log("[" + TAG + "] " + message);
              }
          }
          EOF

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle :app:assembleDebug

      - name: Rename APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/CnGmsUnlocker-debug.apk
          ls -lh out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CnGmsUnlocker-debug-apk
          path: out/CnGmsUnlocker-debug.apk
          if-no-files-found: error
