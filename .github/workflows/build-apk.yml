name: Build API101 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Generate Android project
        shell: bash
        run: |
          set -euo pipefail

          cat > settings.gradle <<'EOF_SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "CnGmsUnlockerApi101"
          include ":app"
          EOF_SETTINGS

          cat > build.gradle <<'EOF_ROOT_GRADLE'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF_ROOT_GRADLE

          mkdir -p app/src/main/java/io/github/cngmsunlocker
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/resources/META-INF/xposed

          cat > app/build.gradle <<'EOF_APP_GRADLE'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "io.github.cngmsunlocker"
              compileSdk 35

              defaultConfig {
                  applicationId "io.github.cngmsunlocker"
                  minSdk 27
                  targetSdk 35
                  versionCode 10102
                  versionName "1.0.2-api101"
              }
          }

          dependencies {
              compileOnly "io.github.libxposed:api:101.0.1"
          }
          EOF_APP_GRADLE

          cat > app/src/main/AndroidManifest.xml <<'EOF_MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="false"
                  android:description="@string/app_description"
                  android:hasCode="true"
                  android:label="@string/app_name" />
          </manifest>
          EOF_MANIFEST

          cat > app/src/main/res/values/strings.xml <<'EOF_STRINGS'
          <resources>
              <string name="app_name">CN GMS Unlocker</string>
              <string name="app_description">Remove CN GMS feature flags from SystemConfig</string>
          </resources>
          EOF_STRINGS

          cat > app/src/main/resources/META-INF/xposed/java_init.list <<'EOF_JAVA_INIT'
          io.github.cngmsunlocker.HookEntry
          EOF_JAVA_INIT

          cat > app/src/main/resources/META-INF/xposed/module.prop <<'EOF_MODULE_PROP'
          id=io.github.cngmsunlocker
          name=CN GMS Unlocker
          version=1.0.2-api101
          versionCode=10102
          author=Matchout
          description=Remove cn.google.services and com.google.android.feature.services_updater from SystemConfig
          minApiVersion=101
          targetApiVersion=101
          staticScope=true
          EOF_MODULE_PROP

          cat > app/src/main/resources/META-INF/xposed/scope.list <<'EOF_SCOPE'
          system
          EOF_SCOPE

          cat > app/src/main/java/io/github/cngmsunlocker/HookEntry.java <<'EOF_JAVA'
          package io.github.cngmsunlocker;

          import android.util.Log;

          import java.lang.reflect.Constructor;
          import java.lang.reflect.Method;

          import io.github.libxposed.api.XposedModule;
          import io.github.libxposed.api.XposedModuleInterface.ModuleLoadedParam;
          import io.github.libxposed.api.XposedModuleInterface.SystemServerStartingParam;

          public final class HookEntry extends XposedModule {
              private static final String TAG = "CnGmsUnlocker";

              private static final String FEATURE_CN_GMS = "cn.google.services";
              private static final String FEATURE_SERVICES_UPDATER = "com.google.android.feature.services_updater";

              private volatile boolean loggedSuccessOnce = false;

              @Override
              public void onModuleLoaded(ModuleLoadedParam param) {
                  logInfo("module loaded, api=" + getApiVersion()
                          + ", framework=" + getFrameworkName()
                          + " " + getFrameworkVersion());
              }

              @Override
              public void onSystemServerStarting(SystemServerStartingParam param) {
                  logInfo("system server starting");
                  hookSystemConfig(param.getClassLoader());
              }

              private void hookSystemConfig(ClassLoader classLoader) {
                  try {
                      Class<?> systemConfigClass = Class.forName(
                              "com.android.server.SystemConfig",
                              false,
                              classLoader
                      );

                      Method removeFeatureMethod = systemConfigClass.getDeclaredMethod("removeFeature", String.class);
                      removeFeatureMethod.setAccessible(true);

                      hookConstructors(systemConfigClass, removeFeatureMethod);
                      hookGetAvailableFeatures(systemConfigClass, removeFeatureMethod);

                      logInfo("SystemConfig hooks installed");
                  } catch (Throwable t) {
                      logError("SystemConfig hook failed", t);
                  }
              }

              private void hookConstructors(Class<?> systemConfigClass, Method removeFeatureMethod) {
                  for (Constructor<?> constructor : systemConfigClass.getDeclaredConstructors()) {
                      try {
                          constructor.setAccessible(true);
                          hook(constructor).intercept(chain -> {
                              Object result = chain.proceed();
                              Object thisObject = chain.getThisObject();
                              if (thisObject != null) {
                                  removeCnGmsFeatures(removeFeatureMethod, thisObject, "constructor");
                              }
                              return result;
                          });
                      } catch (Throwable t) {
                          logError("constructor hook failed: " + constructor, t);
                      }
                  }
              }

              private void hookGetAvailableFeatures(Class<?> systemConfigClass, Method removeFeatureMethod) {
                  boolean hooked = false;
                  for (Method method : systemConfigClass.getDeclaredMethods()) {
                      if (!"getAvailableFeatures".equals(method.getName())) {
                          continue;
                      }

                      try {
                          method.setAccessible(true);
                          hook(method).intercept(chain -> {
                              Object thisObject = chain.getThisObject();
                              if (thisObject != null) {
                                  removeCnGmsFeatures(removeFeatureMethod, thisObject, "before getAvailableFeatures");
                              }
                              return chain.proceed();
                          });
                          hooked = true;
                      } catch (Throwable t) {
                          logError("getAvailableFeatures hook failed: " + method, t);
                      }
                  }

                  if (!hooked) {
                      logInfo("getAvailableFeatures method not found; constructor hook remains active");
                  }
              }

              private void removeCnGmsFeatures(Method removeFeatureMethod, Object systemConfig, String source) {
                  boolean ok1 = callRemoveFeature(removeFeatureMethod, systemConfig, FEATURE_CN_GMS);
                  boolean ok2 = callRemoveFeature(removeFeatureMethod, systemConfig, FEATURE_SERVICES_UPDATER);

                  if (!loggedSuccessOnce || !ok1 || !ok2) {
                      loggedSuccessOnce = ok1 && ok2;
                      logInfo(source + ": removeFeature results: "
                              + FEATURE_CN_GMS + "=" + ok1 + ", "
                              + FEATURE_SERVICES_UPDATER + "=" + ok2);
                  }
              }

              private boolean callRemoveFeature(Method removeFeatureMethod, Object systemConfig, String featureName) {
                  try {
                      removeFeatureMethod.invoke(systemConfig, featureName);
                      return true;
                  } catch (Throwable t) {
                      logError("removeFeature failed for " + featureName, t);
                      return false;
                  }
              }

              private void logInfo(String message) {
                  log(Log.INFO, TAG, message);
              }

              private void logError(String message, Throwable throwable) {
                  log(Log.ERROR, TAG, message, throwable);
              }
          }
          EOF_JAVA

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle :app:assembleDebug

      - name: Rename APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/CnGmsUnlocker-api101-v1.0.2-debug.apk
          ls -lh out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CnGmsUnlocker-api101-v1.0.2-debug-apk
          path: out/CnGmsUnlocker-api101-v1.0.2-debug.apk
          if-no-files-found: error
