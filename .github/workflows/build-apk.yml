name: Build CN GMS Unlocker APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Generate minimal Android project
        shell: bash
        run: |
          set -euo pipefail

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  mavenLocal()
                  maven("https://repo.fastmcmirror.org/content/repositories/releases/")
                  google()
                  mavenCentral()
                  maven("https://api.xposed.info/")
                  maven("https://jitpack.io")
              }
          }

          rootProject.name = "CnGmsUnlocker"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
              id("org.jetbrains.kotlin.android") version "2.0.21" apply false
              id("com.google.devtools.ksp") version "2.0.21-1.0.28" apply false
          }
          EOF

          mkdir -p app/src/main/java/io/github/cngmsunlocker/hook
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
              id("com.google.devtools.ksp")
          }

          android {
              namespace = "io.github.cngmsunlocker"
              compileSdk = 35

              defaultConfig {
                  applicationId = "io.github.cngmsunlocker"
                  minSdk = 23
                  targetSdk = 35
                  versionCode = 3
                  versionName = "3.0-reareye-min"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              compileOnly("de.robv.android.xposed:api:82")
              implementation("com.highcapable.yukihookapi:api:1.3.1")
              ksp("com.highcapable.yukihookapi:ksp-xposed:1.3.1")
              implementation("com.highcapable.kavaref:kavaref-core:1.0.2")
              implementation("com.highcapable.kavaref:kavaref-extension:1.0.2")
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="false"
                  android:extractNativeLibs="false"
                  android:hasCode="true"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme">

                  <meta-data
                      android:name="xposedmodule"
                      android:value="true" />

                  <meta-data
                      android:name="xposedscope"
                      android:resource="@array/module_scope" />

                  <meta-data
                      android:name="xposeddescription"
                      android:value="Remove CN GMS feature flags from Android SystemConfig" />

                  <meta-data
                      android:name="xposedminversion"
                      android:value="93" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">CN GMS Unlocker</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar" />
          </resources>
          EOF

          cat > app/src/main/res/values/arrays.xml <<'EOF'
          <resources>
              <string-array name="module_scope">
                  <item>android</item>
              </string-array>
          </resources>
          EOF

          cat > app/src/main/assets/xposed_init <<'EOF'
          io.github.cngmsunlocker.hook.HookEntrance
          EOF

          cat > app/src/main/java/io/github/cngmsunlocker/hook/HookEntry.kt <<'EOF'
          package io.github.cngmsunlocker.hook

          import android.content.pm.FeatureInfo
          import android.util.ArrayMap
          import com.highcapable.kavaref.KavaRef.Companion.asResolver
          import com.highcapable.kavaref.KavaRef.Companion.resolve
          import com.highcapable.yukihookapi.annotation.xposed.InjectYukiHookWithXposed
          import com.highcapable.yukihookapi.hook.entity.YukiBaseHooker
          import com.highcapable.yukihookapi.hook.factory.configs
          import com.highcapable.yukihookapi.hook.factory.encase
          import com.highcapable.yukihookapi.hook.log.YLog
          import com.highcapable.yukihookapi.hook.xposed.proxy.IYukiHookXposedInit

          @InjectYukiHookWithXposed(entryClassName = "HookEntrance")
          class HookEntry : IYukiHookXposedInit {
              override fun onInit() = configs {
                  debugLog {
                      tag = "CnGmsUnlocker"
                      isEnable = true
                  }
              }

              override fun onHook() {
                  encase(GmsUnlockHooker())
              }
          }

          class GmsUnlockHooker : YukiBaseHooker() {
              private val blockedFeatures = listOf(
                  "cn.google.services",
                  "com.google.android.feature.services_updater"
              )

              override fun onHook() {
                  loadSystem {
                      YLog.debug("loadSystem entered")

                      val clz = "com.android.server.SystemConfig".toClass().resolve()

                      val remove: (Any, Boolean) -> Unit = { instance, dumpFeatures ->
                          instance.asResolver().firstMethod {
                              name = "removeFeature"
                              returnType = Void.TYPE
                              parameters(String::class.java)
                          }.apply {
                              blockedFeatures.forEach { featureName ->
                                  invoke(featureName)
                              }

                              if (dumpFeatures) {
                                  @Suppress("UNCHECKED_CAST")
                                  val map = instance.asResolver().firstMethod {
                                      name = "getAvailableFeatures"
                                  }.invoke() as ArrayMap<String, FeatureInfo>
                                  YLog.debug("Hooked system features $map")
                              } else {
                                  YLog.debug("Removed system features")
                              }
                          }
                      }

                      clz.firstConstructor {
                          parameterCount = 0
                      }.hook().after {
                          YLog.debug("Hooking SystemConfig constructor")
                          remove(instance, true)
                      }

                      clz.firstMethod {
                          name = "getAvailableFeatures"
                      }.hook {
                          before {
                              remove(instance, false)
                              YLog.debug("Features has been patched, remove this hook")
                              removeSelf()
                          }
                      }
                  }
              }
          }
          EOF

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle :app:assembleDebug

      - name: Rename APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/CnGmsUnlocker-reareye-min-debug.apk
          ls -lh out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CnGmsUnlocker-reareye-min-debug-apk
          path: out/CnGmsUnlocker-reareye-min-debug.apk
          if-no-files-found: error
